<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Room | A Curated Book Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <h1 class="site-title">The Reading Room</h1>
                <p class="site-tagline">A Curated Collection of Timeless Literature</p>
            </div>
            <nav class="header-nav">
                <span class="stat"><span id="totalBooks">48</span> Books</span>
                <span class="stat-divider">|</span>
                <span class="stat"><span id="totalCategories">8</span> Categories</span>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section - Featured Book -->
        <section class="hero-section">
            <div class="hero-content">
                <div class="hero-book-cover" id="heroCover">
                    <img src="" alt="Featured Book Cover" id="heroCoverImage">
                </div>
                <div class="hero-info">
                    <span class="hero-label">Featured Read</span>
                    <h2 class="hero-title" id="heroTitle">Loading...</h2>
                    <p class="hero-author" id="heroAuthor">by Author</p>
                    <p class="hero-description" id="heroDescription">Description loading...</p>
                    <button class="hero-btn" id="heroBtn">View Details</button>
                </div>
            </div>
        </section>

        <!-- Category Sections -->
        <div id="categorySections">
            <!-- Categories will be dynamically generated -->
        </div>
    </main>

    <!-- Book Detail Modal -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Close">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="none" stroke="currentColor" stroke-width="2" d="M6 6l12 12M6 18L18 6"/>
                </svg>
            </button>

            <div class="modal-body">
                <div class="modal-cover">
                    <img src="" alt="Book Cover" id="modalCover">
                </div>
                <div class="modal-info">
                    <div class="modal-meta">
                        <span class="modal-genre" id="modalGenre">Genre</span>
                        <span class="modal-year" id="modalYear">Year</span>
                    </div>
                    <h2 class="modal-title" id="modalTitle">Book Title</h2>
                    <p class="modal-author" id="modalAuthor">by Author</p>

                    <div class="modal-divider"></div>

                    <div class="modal-description">
                        <h3>Description</h3>
                        <p id="modalDescription">Book description...</p>
                    </div>

                    <div class="modal-actions">
                        <button class="action-btn favorite-btn" id="favoriteBtn">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path id="favoriteIcon" fill="none" stroke="currentColor" stroke-width="2" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                            </svg>
                            <span id="favoriteText">Add to Favorites</span>
                        </button>
                        <button class="action-btn share-btn" id="shareBtn">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path fill="none" stroke="currentColor" stroke-width="2" d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>
                            </svg>
                            <span>Share</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="none" stroke="currentColor" stroke-width="2" d="M20 6L9 17l-5-5"/>
        </svg>
        <span id="toastMessage">Action completed</span>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <p>The Reading Room &mdash; A personal collection of literary classics</p>
        </div>
    </footer>

    <script src="books/data.js"></script>
    <script src="app.js"></script>
</body>
</html>
